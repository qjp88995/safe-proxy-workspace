log-level: info

tun:
  enable: true
  stack: gvisor
  device: Mihomo
  auto-route: true
  auto-redirect: true
  strict-route: true
  auto-detect-interface: true
  route-exclude-address:
    - 203.0.113.10/32
    - 198.51.100.20/32
  dns-hijack:
    - any:53
    - tcp://any:53

dns:
  enable: true
  listen: 127.0.0.1:53
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - 1.1.1.1
    - 8.8.8.8

proxies:
  - name: "Server-A-Relay"
    type: ss
    server: 203.0.113.10
    port: 8388
    cipher: aes-256-gcm
    password: "REPLACE_WITH_SERVER_A_PASSWORD"
    udp: true

  - name: "Server-B-Exit"
    type: ss
    server: 198.51.100.20
    port: 8388
    cipher: aes-256-gcm
    password: "REPLACE_WITH_SERVER_B_PASSWORD"
    udp: true

proxy-groups:
  - name: "Secure-Relay"
    type: relay
    proxies:
      - "Server-A-Relay"
      - "Server-B-Exit"

rules:
  - MATCH,Secure-Relay
